<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Inspector</title>
  <style>
    /* ========================================
      1. CSS VARIABLES & THEME SETUP
      ======================================== */
    :root[data-theme="dark"] {
      --bg-main: #121212;
      --bg-surface: #1e1e1e;
      --bg-surface-2: #252525;
      --bg-hover: #2c2c2c;
      --border: rgba(255, 255, 255, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.4);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.15);
      --scrollbar-thumb: rgba(255, 255, 255, 0.15);
    }
    :root[data-theme="light"] {
      --bg-main: #f3f4f6;
      --bg-surface: #ffffff;
      --bg-surface-2: #f9fafb;
      --bg-hover: #f3f4f6;
      --border: rgba(0, 0, 0, 0.08);
      --shadow-color: rgba(0, 0, 0, 0.05);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.1);
      --scrollbar-thumb: rgba(0, 0, 0, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
    
    /* ========================================
      2. TOOLBAR & HEADER STYLES
      ======================================== */
    header { 
      background-color: var(--bg-surface); 
      padding: 12px 16px; 
      border-radius: 20px; 
      margin: 12px 16px 0 16px; 
      border: 1px solid var(--border); 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      box-shadow: 0 4px 15px var(--shadow-color); 
      z-index: 10; 
      flex-shrink: 0; 
    }
    
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
    .branding { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .logo-img { width: 24px; height: 24px; object-fit: contain; border-radius: 4px; }
    .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    
    .pill-control {
      background: var(--bg-main); 
      color: var(--text-main); 
      border: 1px solid var(--border);
      padding: 8px 12px; 
      border-radius: 20px; 
      font-size: 12px; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      gap: 6px; 
      transition: all 0.2s; 
      box-shadow: 0 2px 4px var(--shadow-color); 
      outline: none; 
      text-decoration: none;
    }
    .pill-control:hover { background: var(--bg-hover); transform: translateY(-1px); }
    
    select.pill-control { appearance: none; -webkit-appearance: none; padding-right: 28px; }
    .select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; stroke: var(--text-main); stroke-width: 2; fill: none; pointer-events: none; }

    .icon-pills { display: flex; align-items: center; gap: 6px; }
    .icon-pills button, .icon-pills a { padding: 8px; border-radius: 50%; } 
    
    #supportBtn { background-color: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    #supportBtn:hover { background-color: #f59e0b; color: #fff; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }

    #clearBtn { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); font-weight: 600; white-space: nowrap; }
    #clearBtn:hover { background-color: #ef4444; color: #fff; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }

    input[type="text"] { width: 100%; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 12px 16px; border-radius: 12px; font-size: 13px; outline: none; transition: all 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

    /* ========================================
      3. LIST & ACCORDION 
      ======================================== */
    .list-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .list-container::-webkit-scrollbar { width: 6px; }
    .list-container::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 10px; }

    .domain-group { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 12px var(--shadow-color); margin-top: 8px; }
    .domain-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface); transition: background 0.2s; user-select: none; }
    .domain-header:hover { background: var(--bg-hover); }
    .domain-title-wrapper { display: flex; align-items: center; gap: 10px; }
    .domain-title { font-size: 14px; font-weight: 600; }
    .domain-badge { background: var(--border); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }

    .accordion-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .accordion-wrapper.open { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }
    .domain-body { padding: 0 12px 12px 12px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-surface-2); border-top: 1px solid var(--border); max-height: 380px; overflow-y: auto; overscroll-behavior: contain; }
    .domain-body::-webkit-scrollbar { width: 4px; }
    .domain-body::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 10px; }

    .card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-top: 8px; flex-shrink: 0; }
    .card-header { padding: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
    .card-header:hover { background: var(--bg-hover); }
    .card-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .method { font-size: 10px; font-weight: 700; padding: 4px 6px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); }
    .url { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; flex: 1; }
    .time { font-size: 10px; color: var(--text-muted); }
    .card-body-content { padding: 12px; border-top: 1px solid var(--border); }
    
    pre { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-main); white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; background: var(--bg-main); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
    pre::-webkit-scrollbar { width: 4px; }
    pre::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 10px; }
    
    svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 20px; opacity: 0; transition: opacity 0.3s; }
    .modal.open { display: flex; opacity: 1; }
    .modal-content { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 400px; padding: 24px; display: flex; flex-direction: column; gap: 16px; transform: translateY(20px); transition: all 0.3s; }
    .modal.open .modal-content { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 16px; }

    @media (max-width: 380px) {
      .clear-text { display: none; }
      #clearBtn { padding: 8px !important; border-radius: 50% !important; }
      header { padding: 10px 12px; margin: 8px 8px 0 8px; }
      .pill-control { padding: 6px 10px; }
      h1 { display: none; } 
    }
  </style>
</head>
<body>

  <header>
    <div class="toolbar">
      <div class="branding">
        <img src="icon.png" class="logo-img" alt="Logo">
        <h1>Inspector</h1>
      </div>
      <div class="controls">
        <div style="position: relative;">
          <select id="langSelect" class="pill-control">
            <option value="en">EN</option>
            <option value="sv">SV</option>
            <option value="es">ES</option>
            <option value="de">DE</option>
            <option value="fr">FR</option>
          </select>
          <svg class="select-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="icon-pills">
          <a id="supportBtn" class="pill-control" href="https://ko-fi.com/ghostyy69" target="_blank" data-i18n-title="support">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor" stroke="none"/></svg>
          </a>
          <button id="themeToggle" class="pill-control" aria-label="Toggle Theme">
            <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"></svg>
          </button>
          <button id="patchNotesBtn" class="pill-control" aria-label="Patch Notes">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </button>
        </div>
        <button id="clearBtn" class="pill-control" aria-label="Clear logs">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          <span class="clear-text" data-i18n="clearLogs">Clear logs</span>
        </button>
      </div>
    </div>
    <input type="text" id="filterInput" data-i18n-placeholder="filter" placeholder="Filter by domain or URL..." autocomplete="off">
  </header>

  <div class="list-container" id="listContainer"></div>

  <div id="patchModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="patchTitle" data-i18n="releaseNotes">Release Notes</span>
        <button id="closeModalBtn" style="border:none; box-shadow:none; padding:6px; background:transparent; cursor:pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div style="font-size: 13px; color: var(--text-muted); line-height: 1.6;">
        <strong>v1.0.0 (Release)</strong><br>
        - Initial stable release.<br>
        - Fully responsive UI for ultra-narrow side panels.<br>
        - Smart grouping and payload heuristics.<br>
        - Integrated secure donation bridge.
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
